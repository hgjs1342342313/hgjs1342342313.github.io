<!DOCTYPE html>
<html>
<head>
  <title>Basic HTML</title>
  <style>
    /* 添加样式来创建左侧和右侧的盒子 */
    .container {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }
    button{
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100px;
        height: 40px;
        border: 1px solid #39c5bb;
        border-radius: 5px;
    }
    .sidebar {
        width: auto;
        height: 100%;
        background-color: #f2f2f2;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .main-content {
      flex-grow: 1;
      background-color: #eaeaea;
      width: auto;
      height:100%
    }
  </style>
</head>
<body>
  <header>
    <h1>Visualization of Rainfall and Traffic Accident in Hong Kong</h1>
    <h2>Developed by Zheming, Tsun Ho, Keqing, Xiaojian, Yulin</h2>
  </header>

  <div class="container">
    <div class="sidebar">
      <h4>Visualization for:</h4>
      <button id="rainfallButton">Rainfall</button>
      <button id="accidentButton">Traffic Accident</button>
      <button id="tbdButton">Rainfall with Traffic-accident</button>
      <button id="tbd2Button">Summary</button>
    </div>
    <div class="main-content" id="content">
      <!-- 初始的右侧盒子内容 -->
      <p>Cliick the left button to choose visualization result</p>
    </div>
  </div>

  <script>
    // 获取按钮和内容的引用
    const rainfallButton = document.getElementById("rainfallButton");
    const accidentButton = document.getElementById("accidentButton");
    const tbdButton = document.getElementById("tbdButton");
    const tbd2Button = document.getElementById("tbd2Button");
    const contentDiv = document.getElementById("content");

    // 定义按钮点击事件的处理函数
    function handleButtonClick(content) {
      // 清空内容
      contentDiv.innerHTML = "";

      // 创建一个新的 iframe 元素
      const iframe = document.createElement("iframe");
      iframe.src = content;
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.border = "none";

      // 将 iframe 添加到内容容器中
      contentDiv.appendChild(iframe);
    }
        // 页面加载完成后显示 rainfall.html
    document.addEventListener("DOMContentLoaded", function() {
      handleButtonClick("rainfall.html");
    });

    // 绑定按钮点击事件处理函数
    rainfallButton.addEventListener("click", function() {
      handleButtonClick("rainfall.html");
    });

    accidentButton.addEventListener("click", function() {
      handleButtonClick("traffic-accident.html");
    });

    tbdButton.addEventListener("click", function() {
      handleButtonClick("tbd.html");
    });

    tbd2Button.addEventListener("click", function() {
      handleButtonClick("tbd2.html");
    });
  </script>
</body>
</html>
